<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Pseudo Classes</title>
  <style>
    /* Root background */
    :root {
      background-color: rgb(135, 206, 235);
    }

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    article p {
      padding: 10px;
    }

    /* First paragraph */
    article p:first-child {
      color: white;
      background-color: black;
    }

    /* Second paragraph */
    article p:nth-child(2) {
      color: black;
    }

    /* Third (last) paragraph */
    article p:last-child {
      color: red;
    }

    /* List styling */
    ul {
      list-style-type: disc;
      padding-left: 20px;
    }

    li {
      width: 50%;
      padding: 10px;
      background-color: gray;
    }

    /* Odd items */
    li:nth-child(odd) {
      background-color: white;
    }

    /* First and last item */
    li:first-child,
    li:last-child {
      font-size: 22px;
    }

    /* Third-to-last item */
    li:nth-last-child(3) {
      background-color: pink;
    }
  </style>
</head>
<body>

  <article>
    <p>First paragraph - white text on black background.</p>
    <p>Second paragraph - normal text.</p>
    <p>Third paragraph - red text.</p>
  </article>

  <ul>
    <li>First Item</li>
    <li>Second Item</li>
    <li>Third Item</li>
    <li>Fourth Item</li>
    <li>Fifth Item</li>
  </ul>

</body>
</html>
